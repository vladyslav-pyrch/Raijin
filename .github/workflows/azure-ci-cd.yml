name: Azure CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment_name:
        description: Azure environment suffix used in resource names.
        required: true
        default: prod
      location:
        description: Azure region.
        required: true
        default: westeurope

permissions:
  contents: read
  id-token: write

env:
  NODE_VERSION: 24.x
  POSTGRES_IMAGE: postgres:17.6

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: src/spa/package-lock.json

      - name: Install SPA dependencies
        run: npm install --prefix src/spa

      - name: Restore backend
        run: dotnet restore Raijin.slnx

      - name: Build solution
        run: dotnet build Raijin.slnx --configuration Release --no-restore

      - name: Build SPA
        env:
          VITE_COMBINATORICS_API_URL: http://localhost:8080
        run: npm run build --prefix src/spa

  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    environment: azure
    env:
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize SPA path
        shell: bash
        run: |
          if [ -d src/Spa ]; then
            rsync -a src/Spa/ src/spa/
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: src/spa/package-lock.json

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID || secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID || secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID || secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve deployment settings
        shell: bash
        run: |
          environment_name="${{ inputs.environment_name }}"
          location="${{ inputs.location }}"
          resource_group="${{ vars.AZURE_RESOURCE_GROUP_NAME }}"

          if [ -z "$environment_name" ]; then
            environment_name="prod"
          fi

          if [ -z "$location" ]; then
            location="${{ vars.AZURE_LOCATION }}"
          fi

          if [ -z "$location" ]; then
            location="westeurope"
          fi

          if [ -z "$resource_group" ]; then
            resource_group="rg-raijin-$environment_name"
          fi

          if [ -z "$POSTGRES_PASSWORD" ]; then
            echo "POSTGRES_PASSWORD repository secret is required."
            exit 1
          fi

          image_tag="${GITHUB_SHA::12}"

          echo "ENVIRONMENT_NAME=$environment_name" >> "$GITHUB_ENV"
          echo "AZURE_LOCATION=$location" >> "$GITHUB_ENV"
          echo "RESOURCE_GROUP_NAME=$resource_group" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=$image_tag" >> "$GITHUB_ENV"

      - name: Register Azure resource providers
        shell: bash
        run: |
          az provider register --namespace Microsoft.App --wait
          az provider register --namespace Microsoft.ContainerRegistry --wait
          az provider register --namespace Microsoft.ManagedIdentity --wait
          az provider register --namespace Microsoft.Network --wait
          az provider register --namespace Microsoft.OperationalInsights --wait
          az provider register --namespace Microsoft.Storage --wait
          az provider register --namespace Microsoft.Web --wait

      - name: Create resource group
        run: az group create --name "$RESOURCE_GROUP_NAME" --location "$AZURE_LOCATION"

      - name: Deploy core infrastructure
        shell: bash
        run: |
          az deployment group create \
            --name "core-${GITHUB_RUN_ID}" \
            --resource-group "$RESOURCE_GROUP_NAME" \
            --template-file infra/core.bicep \
            --parameters \
              environmentName="$ENVIRONMENT_NAME" \
              location="$AZURE_LOCATION" \
              postgresAdminPassword="$POSTGRES_PASSWORD" \
              postgresImage="$POSTGRES_IMAGE"

      - name: Read core outputs
        shell: bash
        run: |
          output_query="properties.outputs"
          acr_name="$(az deployment group show --resource-group "$RESOURCE_GROUP_NAME" --name "core-${GITHUB_RUN_ID}" --query "$output_query.acrName.value" -o tsv)"
          acr_login_server="$(az deployment group show --resource-group "$RESOURCE_GROUP_NAME" --name "core-${GITHUB_RUN_ID}" --query "$output_query.acrLoginServer.value" -o tsv)"

          echo "ACR_NAME=$acr_name" >> "$GITHUB_ENV"
          echo "ACR_LOGIN_SERVER=$acr_login_server" >> "$GITHUB_ENV"

      - name: Login to Azure Container Registry
        run: az acr login --name "$ACR_NAME"

      - name: Build and push backend images
        shell: bash
        run: |
          api_image="$ACR_LOGIN_SERVER/raijin/combinatorics-api:$IMAGE_TAG"
          migration_image="$ACR_LOGIN_SERVER/raijin/combinatorics-migration-worker:$IMAGE_TAG"
          sat_solver_image="$ACR_LOGIN_SERVER/raijin/combinatorics-sat-solver:$IMAGE_TAG"

          docker build -f src/CombinatoricsService/Api/Dockerfile -t "$api_image" .
          docker build -f src/CombinatoricsService/MigrationWorker/Dockerfile -t "$migration_image" .
          docker build -f src/CombinatoricsService/SatSolver/Dockerfile -t "$sat_solver_image" .

          docker push "$api_image"
          docker push "$migration_image"
          docker push "$sat_solver_image"

          echo "API_IMAGE=$api_image" >> "$GITHUB_ENV"
          echo "MIGRATION_IMAGE=$migration_image" >> "$GITHUB_ENV"
          echo "SAT_SOLVER_IMAGE=$sat_solver_image" >> "$GITHUB_ENV"

      - name: Deploy application resources
        shell: bash
        run: |
          az deployment group create \
            --name "apps-${GITHUB_RUN_ID}" \
            --resource-group "$RESOURCE_GROUP_NAME" \
            --template-file infra/apps.bicep \
            --parameters \
              environmentName="$ENVIRONMENT_NAME" \
              location="$AZURE_LOCATION" \
              apiImage="$API_IMAGE" \
              migrationWorkerImage="$MIGRATION_IMAGE" \
              satSolverImage="$SAT_SOLVER_IMAGE" \
              postgresAdminPassword="$POSTGRES_PASSWORD"

      - name: Read application outputs
        shell: bash
        run: |
          output_query="properties.outputs"
          api_url="$(az deployment group show --resource-group "$RESOURCE_GROUP_NAME" --name "apps-${GITHUB_RUN_ID}" --query "$output_query.apiUrl.value" -o tsv)"
          migration_job_name="$(az deployment group show --resource-group "$RESOURCE_GROUP_NAME" --name "apps-${GITHUB_RUN_ID}" --query "$output_query.migrationJobName.value" -o tsv)"
          static_web_app_name="$(az deployment group show --resource-group "$RESOURCE_GROUP_NAME" --name "apps-${GITHUB_RUN_ID}" --query "$output_query.staticWebAppName.value" -o tsv)"
          static_web_app_url="$(az deployment group show --resource-group "$RESOURCE_GROUP_NAME" --name "apps-${GITHUB_RUN_ID}" --query "$output_query.staticWebAppUrl.value" -o tsv)"

          echo "API_URL=$api_url" >> "$GITHUB_ENV"
          echo "MIGRATION_JOB_NAME=$migration_job_name" >> "$GITHUB_ENV"
          echo "STATIC_WEB_APP_NAME=$static_web_app_name" >> "$GITHUB_ENV"
          echo "STATIC_WEB_APP_URL=$static_web_app_url" >> "$GITHUB_ENV"

      - name: Run database migration job
        shell: bash
        run: |
          execution_name="$(az containerapp job start --name "$MIGRATION_JOB_NAME" --resource-group "$RESOURCE_GROUP_NAME" --query name -o tsv)"
          if [ -z "$execution_name" ]; then
            execution_name="$(az containerapp job execution list --name "$MIGRATION_JOB_NAME" --resource-group "$RESOURCE_GROUP_NAME" --query "sort_by(@, &name)[-1].name" -o tsv)"
          fi

          echo "Started migration job execution: $execution_name"

          for attempt in {1..90}; do
            status="$(az containerapp job execution show \
              --name "$MIGRATION_JOB_NAME" \
              --resource-group "$RESOURCE_GROUP_NAME" \
              --job-execution-name "$execution_name" \
              --query "properties.status || properties.runningState || status" \
              -o tsv)"

            echo "Migration job status: $status"

            if [ "$status" = "Succeeded" ]; then
              exit 0
            fi

            if [ "$status" = "Failed" ] || [ "$status" = "Canceled" ] || [ "$status" = "Cancelled" ]; then
              exit 1
            fi

            sleep 10
          done

          echo "Migration job did not finish before the timeout."
          exit 1

      - name: Install SPA dependencies
        run: npm install --prefix src/spa

      - name: Build SPA for deployed API
        env:
          VITE_COMBINATORICS_API_URL: ${{ env.API_URL }}
        run: npm run build --prefix src/spa

      - name: Get Static Web Apps deployment token
        id: static_web_app_token
        shell: bash
        run: |
          token="$(az staticwebapp secrets list --name "$STATIC_WEB_APP_NAME" --resource-group "$RESOURCE_GROUP_NAME" --query properties.apiKey -o tsv)"
          echo "::add-mask::$token"
          echo "token=$token" >> "$GITHUB_OUTPUT"

      - name: Deploy SPA to Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.static_web_app_token.outputs.token }}
          action: upload
          app_location: src/spa/dist
          skip_app_build: true
          skip_api_build: true

      - name: Deployment summary
        shell: bash
        run: |
          {
            echo "## Raijin Azure deployment"
            echo ""
            echo "- API: $API_URL"
            echo "- SPA: $STATIC_WEB_APP_URL"
            echo "- Resource group: $RESOURCE_GROUP_NAME"
            echo "- Image tag: $IMAGE_TAG"
          } >> "$GITHUB_STEP_SUMMARY"
