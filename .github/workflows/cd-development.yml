name: CD Development

on:
  push:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: cd-development
  cancel-in-progress: true

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_NOLOGO: true
  NODE_VERSION: 24.x
  ASPIRE_ENVIRONMENT: Development
  Azure__Location: westeurope
  Azure__CredentialSource: AzureCli
  Azure__ResourceGroup: raijin-dev

jobs:
  deploy:
    name: Deploy Development
    runs-on: ubuntu-latest
    environment: development
    env:
      Azure__SubscriptionId: ${{ vars.AZURE_SUBSCRIPTION_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Install Aspire CLI
        run: |
          curl -sSL https://aspire.dev/install.sh | bash
          echo "$HOME/.aspire/bin" >> "$GITHUB_PATH"

      - name: Show Aspire CLI version
        run: aspire --version

      - name: Deploy with Aspire
        run: >
          aspire deploy
          --apphost src/AppHost/Raijin.AppHost.csproj
          --environment "${{ env.ASPIRE_ENVIRONMENT }}"